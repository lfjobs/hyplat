<!doctype html>
<html>
<head>
<title>支付</title>

<meta charset="UTF-8">
<meta name="viewport" content=" initial-scale=1.0,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta content="black" name="apple-mobile-web-app-status-bar-style" />

<script src="/js/jquery.js" type="text/javascript"></script>
<style>
.container {
	width: 100%;
	text-align: center;
}

.zfb,.wechat {
	width: 33%;
	float: left;
}

.paytype {
	width: 40%;
	font-size: 18px;
	margin-left: 10px;
}
</style>

</head>

<body>

	<p class="paytype">请选择支付方式:</p>
	<div class="container">

		<div class="wechat">
			<img src="/images/WFJClient/wechat.jpg" width="60px" height="60px"><br />微信

		</div>

		<div class="zfb">
			<img src="/images/WFJClient/zfb.png" width="60px" height="60px"><br />支付宝

		</div>

		<div class="yinlian">
			<img src="/images/WFJClient/yinlian.jpg" width="70px" height="60px"><br />银联

		</div>

	</div>
</body>

<script>
	var ff;
	$(document).ready(
			function() {

				var thisURL = document.URL;
				var getval = thisURL.split('?')[1];

				var journalNum = getval.substring(getval.indexOf("=") + 1,
						getval.indexOf("&"));
				var money = getval.substring(getval.indexOf("money=") + 6,
						getval.lastIndexOf("&"));
				var subject = getval.substring(getval.indexOf("subject=") + 8);
				//money = 0.01;

				//点击测试,注意参数是demo中生成的package
				$(".wechat").click(function() {

					var url = "/ea/buyproducts/ajax_ea_weChatpay.jspa";

					$.ajax({
						url : url,
						type : "get",
						dataType : "json",
						async : false,
						data : {
							"cashierBills.journalNum" :"12344",
							"goodsBills.goodsName" : "gegdgdg",
							"goodsBills.money" : 123

						},
						success : function(data) {

							var me = eval("(" + data + ")");
							var finalpackage = "{" + me.result +

							"}";
							//alert(finalpackage)

							ff = $.parseJSON(finalpackage);

							if (typeof WeixinJSBridge ==

							"undefined") {
								if (document.addEventListener)

								{

									document.addEventListener(

									'WeixinJSBridgeReady',

									onBridgeReady, false);
								} else if

								(document.attachEvent) {
									document.attachEvent(

									'WeixinJSBridgeReady',

									onBridgeReady);
									document.attachEvent(

									'onWeixinJSBridgeReady',

									onBridgeReady);
								}
							} else {
								onBridgeReady();
							}

						},
						error : function(data) {
							alert("fail");
						}
					});

				});
			});

	function onBridgeReady() {
		WeixinJSBridge.invoke('getBrandWCPayRequest', {
			"appId" : ff.appId, //公众号名称，由商户传入
			"timeStamp" : ff.timeStamp, //时间戳
			"nonceStr" : ff.nonceStr, //随机串
			"package" : ff.package,//扩展包
			"signType" : ff.signType, //微信签名方式:1.sha1
			"paySign" : ff.paySign
		//微信签名
		}, function(res) {
			//alert(res.err_msg);
			if (res.err_msg == 'get_brand_wcpay_request:ok') {
				alert('恭喜您，支付成功!');
			} else {
				alert('支付失败');
			}

		});
	}
</script>
</html>
