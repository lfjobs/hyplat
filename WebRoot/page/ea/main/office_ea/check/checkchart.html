<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN" "xhtml11.dtd">
<html debug="true">
	<head>
		<title>图表统计</title> <#include
		"/page/ea/main/office_ea/check/js_css.html">
		<script
			src="${base}/page/ea/main/office_ea/check/highcharts/highcharts.js"></script>
		<script type="text/javascript">
(function($){ // encapsulate jQuery
var chart;
$(document).ready(function() {
	chart = new Highcharts.Chart({
		chart: {
			renderTo: 'container',
			plotBackgroundColor: null,
			plotBorderWidth: null,
			plotShadow: false
		},
		title: {
			text: '数据饼状图表'
		},
		tooltip: {
			formatter: function() {
				return '<b>'+ this.point.name +'</b>: '+ this.percentage.toFixed(2) +' %';
			}
		},
		plotOptions: {
			pie: {
				allowPointSelect: true,
				cursor: 'pointer',
				dataLabels: {
					enabled: true,
					color: '#000000',
					connectorColor: '#000000',
					formatter: function() {
						return '<b>'+ this.point.name +'</b>: '+ this.percentage.toFixed(2) +' %';
					}
				}
			}
		},
		series: [{
			type: 'pie',
			name: 'pie',
			data: [
				['应急物品检查',   55.0],
				['消耗品检查 ',       26.8],
				{
					name: 'EMS',
					y: 12.8,
					sliced: true,
					selected: true
				},
				['车内清洁度',    8.5],
				['${divide}',    8.5]
			]
		}]
	});
});
})(jQuery);
</script>
	<body>
		<div style="margin: 0 1em">
			<div id="container"
				style="min-width: 400px; height: 400px; margin: 0 auto"></div>
		</div>
	</body>
</html>
